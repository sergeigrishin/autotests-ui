
name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Playwright tests with pytest and generate Allure results
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results


  publish-report:
    if: always()
    needs: [ run-tests ]
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем ветку с готовыми отчетами (gh-pages) в папку gh-pages
      - name: Check out gh-pages repository
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # 2. Скачиваем свежие результаты тестов из артефактов в папку allure-results
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # 3. Ставим Java (она нужна для работы Allure CLI)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Ставим официальный Allure CLI нужной версии
      - name: Install Allure CLI
        run: |
            curl -L "$ALLURE_URL" -o allure-2.24.0.tgz
            tar -zxvf allure-2.24.0.tgz
            sudo mv allure-2.24.0 /opt/allure
            sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 5. Копируем историю из старых отчетов в новые результаты, чтобы работал график трендов
      - name: Copy Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      # 6. Генерируем чистый итоговый отчет в папку allure-report
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # 7. Переносим историю из только что сгенерированного отчета обратно в корень (нужно для деплоя)
      - name: Update history directory for gh-pages
        run: |
          cp -r allure-report/history gh-pages/ history/ || true
          cp -r allure-report/* gh-pages/

      # 8. Публикуем всё содержимое папки gh-pages на GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages
