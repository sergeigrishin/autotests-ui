name: UI-tests

#Где запускаем
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies  #Устанавливаем зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps
          
      - name: Run Playwright tests with pytest and generate Allure result
        run: |
          pytest -m regression --alluredir=./allure-results --numprocesses 2

      - name: Get Allure history
        uses: actions/checkout@v3
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from marketplace
        uses: mgrybyk-org/allure-report-branch-action@v1.11
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20


      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh_pages
          PUBLISH_DIR: allure-history


